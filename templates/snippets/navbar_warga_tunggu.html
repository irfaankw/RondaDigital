{% load static %}
{% with url_name=request.resolver_match.url_name %}
<nav class="fixed bottom-0 left-0 w-full z-50">
    <div class="relative grid grid-cols-5 items-center bg-slate-950/80 backdrop-blur-lg border-t border-slate-800/60 pt-4 pb-5 px-4 shadow-[0_-8px_32px_rgba(0,0,0,0.5)] text-center">
        
        {# ── Beranda ── #}
        <a href="{% url 'account:home_index' %}"
           class="flex flex-col items-center gap-1 transition-colors pt-2
                  {% if url_name == 'home_index' %}text-cyan-400{% else %}text-slate-500 hover:text-slate-400{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            <span class="text-[10px] font-semibold tracking-wide">Beranda</span>
        </a>

        {# ── CCTV ── #}
        <a href="#"
           class="flex flex-col items-center gap-1 transition-colors pt-2
                  {% if url_name == 'cctv' %}text-cyan-400{% else %}text-slate-500 hover:text-slate-400{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
            </svg>
            <span class="text-[10px] font-semibold tracking-wide">CCTV</span>
        </a>

        <div class="flex flex-col items-center justify-center cursor-not-allowed select-none pt-8" title="Akun kamu belum diverifikasi oleh Ketua RT">
            <span class="text-slate-500 text-xs font-bold tracking-wide mt-1">Tunggu Verifikasi</span>
        </div>

        {# ── Laporan ── #}
        <a href="#"
           class="flex flex-col items-center gap-1 transition-colors pt-2
                  {% if url_name == 'laporan' %}text-cyan-400{% else %}text-slate-500 hover:text-slate-400{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <span class="text-[10px] font-semibold tracking-wide">Laporan</span>
        </a>

        {# ── Profil ── #}
        <a href="#"
           class="flex flex-col items-center gap-1 transition-colors pt-2
                  {% if url_name == 'profile' %}text-cyan-400{% else %}text-slate-500 hover:text-slate-400{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <span class="text-[10px] font-semibold tracking-wide">Profil</span>
        </a>

        <div class="absolute left-1/2 -translate-x-1/2 -top-8 cursor-not-allowed select-none z-50"
             title="Akun kamu belum diverifikasi oleh Ketua RT">
            <div class="w-20 h-20 rounded-full bg-slate-500/10 backdrop-blur-md border border-slate-700/50 shadow-[0_8px_24px_rgba(0,0,0,0.6)] flex items-center justify-center p-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
        </div>

    </div>
</nav>
{% endwith %}
