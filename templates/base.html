{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} RondaDigital {% endblock title %}</title>
    <link rel="stylesheet" href="{% static 'dist/style.css' %}">
    <style>
        .grid-bg {
            background-image: 
                linear-gradient(to right, rgba(0, 242, 254, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 242, 254, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="bg-[#020d20] text-slate-100 min-h-screen flex flex-col relative overflow-x-hidden antialiased font-sans">
    
    <div class="absolute inset-0 grid-bg pointer-events-none z-0"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-[radial-gradient(circle_at_50%_50%,rgba(0,242,254,0.06)_0%,transparent_70%)] pointer-events-none z-0"></div>

    {% include "snippets/navbar.html" %}

    <main class="flex-grow relative z-10 w-full">
        {% block content %}
        {% endblock content %}
    </main>

</body>
</html>
